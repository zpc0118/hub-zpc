<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReAct Financial Agent — 教学演示</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
  }

  /* ── 顶部 ── */
  header {
    background: #1a1d27;
    border-bottom: 1px solid #2d3148;
    padding: 12px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 600; color: #a78bfa; }
  header .subtitle { font-size: 12px; color: #64748b; }
  .session-info {
    font-size: 11px;
    color: #475569;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .session-id-chip {
    background: #1e2235;
    border: 1px solid #2d3148;
    border-radius: 12px;
    padding: 3px 10px;
    font-family: monospace;
    font-size: 11px;
    color: #a78bfa;
  }
  .new-session-btn {
    padding: 4px 12px;
    border-radius: 12px;
    border: 1px solid #3d4163;
    background: transparent;
    color: #94a3b8;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .new-session-btn:hover { border-color: #7c3aed; color: #a78bfa; }

  /* ── 主体布局 ── */
  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

  /* ── 输入区 ── */
  .input-card {
    background: #1a1d27;
    border: 1px solid #2d3148;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .mode-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .mode-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid #3d4163;
    background: transparent;
    color: #94a3b8;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-btn.active {
    background: #7c3aed;
    border-color: #7c3aed;
    color: #fff;
  }
  .mode-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .input-row {
    display: flex;
    gap: 10px;
  }
  textarea {
    flex: 1;
    background: #0f1117;
    border: 1px solid #2d3148;
    border-radius: 8px;
    color: #e2e8f0;
    padding: 10px 14px;
    font-size: 14px;
    resize: vertical;
    min-height: 72px;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: #7c3aed; }
  .send-btn {
    padding: 0 24px;
    background: #7c3aed;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .send-btn:hover:not(:disabled) { background: #6d28d9; }
  .send-btn:disabled { background: #3d4163; cursor: not-allowed; }

  /* ── 示例问题 ── */
  .examples { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
  .example-chip {
    background: #1e2235;
    border: 1px solid #2d3148;
    border-radius: 16px;
    padding: 4px 12px;
    font-size: 12px;
    color: #94a3b8;
    cursor: pointer;
    transition: all 0.2s;
  }
  .example-chip:hover { border-color: #7c3aed; color: #a78bfa; }
  .mode-hint {
    font-size: 11px;
    color: #475569;
    margin-top: 8px;
  }

  /* ── 状态栏 ── */
  .status-bar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: #1a1d27;
    border: 1px solid #2d3148;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 13px;
    color: #94a3b8;
  }
  .status-bar.visible { display: flex; }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid #3d4163;
    border-top-color: #7c3aed;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 对话轮次 ── */
  .rounds-container { display: flex; flex-direction: column; gap: 24px; }
  .round-group {
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

  .user-bubble {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 12px;
  }
  .user-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #2d1f5e;
    border: 1px solid #4c1d95;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .user-question {
    background: #1e2235;
    border: 1px solid #2d3148;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    color: #e2e8f0;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ── 步骤卡片 ── */
  .steps-inner { display: flex; flex-direction: column; gap: 8px; margin-left: 42px; }

  .step-card {
    background: #1a1d27;
    border: 1px solid #2d3148;
    border-radius: 10px;
    overflow: hidden;
  }

  .step-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    cursor: pointer;
    user-select: none;
  }
  .step-badge {
    background: #2d3148;
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 11px;
    color: #64748b;
    font-weight: 600;
  }
  .step-title { font-size: 13px; font-weight: 500; flex: 1; }
  .step-toggle { color: #64748b; font-size: 12px; }

  .step-body { padding: 0 14px 12px; }

  .thought-block  { border-left: 3px solid #38bdf8; padding-left: 12px; margin-bottom: 10px; }
  .action-block   { border-left: 3px solid #fbbf24; padding-left: 12px; margin-bottom: 10px; }
  .obs-block      { border-left: 3px solid #34d399; padding-left: 12px; }
  .final-block    { border-left: 3px solid #a78bfa; padding-left: 12px; }

  .block-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .thought-block  .block-label { color: #38bdf8; }
  .action-block   .block-label { color: #fbbf24; }
  .obs-block      .block-label { color: #34d399; }
  .final-block    .block-label { color: #a78bfa; }

  .block-content {
    font-size: 13px;
    line-height: 1.6;
    color: #cbd5e1;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .obs-block .block-content {
    max-height: 220px;
    overflow-y: auto;
    background: #0d1017;
    border-radius: 4px;
    padding: 6px 10px;
    scrollbar-width: thin;
    scrollbar-color: #3d4163 transparent;
  }

  .tool-pill {
    display: inline-block;
    background: #2d1f5e;
    border: 1px solid #4c1d95;
    border-radius: 4px;
    padding: 1px 8px;
    font-size: 12px;
    color: #a78bfa;
    font-family: monospace;
    margin-bottom: 6px;
  }
  .args-code {
    background: #0f1117;
    border-radius: 4px;
    padding: 6px 10px;
    font-family: monospace;
    font-size: 12px;
    color: #94a3b8;
    margin-top: 4px;
  }

  /* ── 最终答案卡 ── */
  .final-card {
    background: #1a1d27;
    border: 1px solid #4c1d95;
    border-radius: 10px;
    padding: 16px 20px;
    margin-left: 42px;
  }
  .final-card h3 { color: #a78bfa; font-size: 14px; margin-bottom: 10px; }
  .final-card .answer-text {
    font-size: 15px;
    line-height: 1.8;
    color: #e2e8f0;
    white-space: pre-wrap;
  }
  .meta-row {
    margin-top: 12px;
    font-size: 12px;
    color: #475569;
    display: flex;
    gap: 16px;
  }

  .fc-thought-note {
    font-size: 12px;
    color: #475569;
    font-style: italic;
  }

  /* ── 错误卡 ── */
  .error-card {
    background: #1a1d27;
    border: 1px solid #7f1d1d;
    border-radius: 10px;
    padding: 16px 20px;
    margin-left: 42px;
  }
  .error-card h3 { color: #f87171; font-size: 14px; }

  /* ── 折叠 ── */
  .step-body.collapsed { display: none; }
  .step-toggle.open::before { content: "▲"; }
  .step-toggle:not(.open)::before { content: "▼"; }

  /* ── 空状态 ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #475569;
  }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: #64748b; }
</style>
</head>
<body>

<header>
  <div>
    <h1>ReAct Financial Agent</h1>
    <div class="subtitle">Thought → Action → Observation 循环演示 | 多轮对话</div>
  </div>
  <div class="session-info">
    <span>Session:</span>
    <span class="session-id-chip" id="sessionIdChip">---</span>
    <button class="new-session-btn" onclick="newSession()">新会话</button>
  </div>
</header>

<div class="container">

  <!-- 输入区 -->
  <div class="input-card">
    <div class="mode-toggle">
      <span style="font-size:13px;color:#64748b;margin-right:4px;">实现方式：</span>
      <button class="mode-btn active" id="modeManualBtn" data-mode="manual" onclick="setMode('manual',this)">
        手写 Prompt 解析
      </button>
      <button class="mode-btn" id="modeFcBtn" data-mode="fc" onclick="setMode('fc',this)">
        Function Calling
      </button>
    </div>
    <div class="mode-hint" id="modeHint">
      会话模式可在发送第一条消息后锁定
    </div>
    <div class="input-row">
      <textarea id="question" placeholder="输入问题，例如：贵州茅台和五粮液2023年的毛利率哪家更高？"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendQuery()">发 送</button>
    </div>
    <div class="examples">
      <span style="font-size:12px;color:#475569;margin-right:4px;">示例：</span>
      <span class="example-chip" onclick="setQuestion(this.textContent)">茅台和五粮液2023年毛利率差多少个百分点？</span>
      <span class="example-chip" onclick="setQuestion(this.textContent)">宁德时代2021-2023年营收复合增长率是多少？</span>
      <span class="example-chip" onclick="setQuestion(this.textContent)">贵州茅台过去一年（2023年全年）股价涨跌幅？</span>
      <span class="example-chip" onclick="setQuestion(this.textContent)">海康威视2023年年报提到了哪些主要风险？</span>
      <span class="example-chip" onclick="setQuestion(this.textContent)" title="边界演示">预测明年A股市场走势</span>
    </div>
  </div>

  <!-- 状态栏 -->
  <div class="status-bar" id="statusBar">
    <div class="spinner"></div>
    <span id="statusText">正在思考...</span>
  </div>

  <!-- 对话历史 + 当前结果 -->
  <div class="rounds-container" id="roundsContainer">
    <div class="empty-state" id="emptyState">
      <h3>开始多轮对话</h3>
      <p>输入问题后，Agent 会逐步推理并给出答案。<br>后续问题会记住之前的对话上下文。</p>
    </div>
  </div>

</div>

<script>
  let currentMode  = 'manual';
  let sessionId    = null;
  let isRunning    = false;
  let modeLocked   = false;   // 发出第一条消息后锁定 mode

  // ── 初始化：自动创建会话 ──────────────────────────────────────────────────
  async function initSession() {
    try {
      const resp = await fetch('/session/new', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode: currentMode }),
      });
      const data = await resp.json();
      sessionId = data.session_id;
      document.getElementById('sessionIdChip').textContent = sessionId;
      modeLocked = false;
      updateModeHint();
    } catch (err) {
      document.getElementById('sessionIdChip').textContent = '连接失败';
    }
  }

  async function newSession() {
    if (isRunning) return;
    document.getElementById('roundsContainer').innerHTML = `
      <div class="empty-state" id="emptyState">
        <h3>开始多轮对话</h3>
        <p>已创建新会话</p>
      </div>`;
    await initSession();
  }

  // ── Mode 切换 ────────────────────────────────────────────────────────────
  function setMode(mode, btn) {
    if (modeLocked) return;
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (!isRunning) initSession();
  }

  function updateModeHint() {
    const hint = document.getElementById('modeHint');
    const manualBtn = document.getElementById('modeManualBtn');
    const fcBtn = document.getElementById('modeFcBtn');
    if (modeLocked) {
      hint.textContent = `会话已锁定：${currentMode === 'manual' ? '手写 Prompt 解析' : 'Function Calling'} 模式`;
      manualBtn.disabled = true;
      fcBtn.disabled = true;
    } else {
      hint.textContent = '会话模式可在发送第一条消息后锁定';
      manualBtn.disabled = false;
      fcBtn.disabled = false;
    }
  }

  function setQuestion(text) {
    document.getElementById('question').value = text;
  }

  function setStatus(text, visible) {
    const bar = document.getElementById('statusBar');
    document.getElementById('statusText').textContent = text;
    bar.classList.toggle('visible', visible);
  }

  function setSendEnabled(enabled) {
    const btn = document.getElementById('sendBtn');
    btn.disabled = !enabled;
    btn.textContent = enabled ? '发 送' : '运行中...';
    isRunning = !enabled;
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── 构建一轮对话的 DOM ──────────────────────────────────────────────────
  function createRoundGroup(question, roundNum) {
    const group = document.createElement('div');
    group.className = 'round-group';
    group.id = `round-${roundNum}`;
    group.style.display = 'none';

    group.innerHTML = `
      <div class="user-bubble">
        <div class="user-avatar">👤</div>
        <div class="user-question">${esc(question)}</div>
      </div>
      <div class="steps-inner" id="steps-${roundNum}"></div>
    `;
    return group;
  }

  function createStepCard(stepData) {
    const card = document.createElement('div');
    card.className = 'step-card';
    const isManual = (currentMode === 'manual');

    const header = document.createElement('div');
    header.className = 'step-header';
    header.innerHTML = `
      <span class="step-badge">Step ${stepData.step}</span>
      <span class="step-title">${stepData.action}(${JSON.stringify(stepData.action_input||{})})</span>
      <span class="step-toggle open"></span>
    `;

    const body = document.createElement('div');
    body.className = 'step-body';

    if (isManual && stepData.thought) {
      body.innerHTML += `
        <div class="thought-block">
          <div class="block-label">Thought</div>
          <div class="block-content">${esc(stepData.thought)}</div>
        </div>`;
    } else if (!isManual) {
      body.innerHTML += `
        <div class="thought-block">
          <div class="block-label">Thought</div>
          <div class="fc-thought-note">Function Calling 版：模型内部推理，不可见</div>
        </div>`;
    }

    body.innerHTML += `
      <div class="action-block">
        <div class="block-label">Action</div>
        <span class="tool-pill">${esc(stepData.action)}</span>
        <div class="args-code">${esc(JSON.stringify(stepData.action_input||{}, null, 2))}</div>
      </div>
      <div class="obs-block">
        <div class="block-label">Observation</div>
        <div class="block-content">${esc((stepData.observation||'').replace(/\n{3,}/g, '\n\n').trim())}</div>
      </div>`;

    header.addEventListener('click', () => {
      body.classList.toggle('collapsed');
      header.querySelector('.step-toggle').classList.toggle('open');
    });

    card.appendChild(header);
    card.appendChild(body);
    return card;
  }

  function createFinalCard(stepData, totalSteps, elapsedS) {
    const card = document.createElement('div');
    card.className = 'final-card';
    card.innerHTML = `
      <h3>Final Answer</h3>
      <div class="answer-text">${esc(stepData.answer)}</div>
      <div class="meta-row">
        <span>共 ${totalSteps} 步</span>
        <span>耗时 ~${elapsedS}s</span>
        <span>实现：${ currentMode === 'manual' ? '手写Prompt解析' : 'Function Calling' }</span>
      </div>`;
    return card;
  }

  function createErrorCard(msg) {
    const card = document.createElement('div');
    card.className = 'error-card';
    card.innerHTML = `<h3>${esc(msg)}</h3>`;
    return card;
  }

  // ── 主发送逻辑 ──────────────────────────────────────────────────────────
  async function sendQuery() {
    if (isRunning) return;
    const question = document.getElementById('question').value.trim();
    if (!question) return;

    if (!sessionId) {
      await initSession();
    }

    // 锁定 mode
    if (!modeLocked) {
      modeLocked = true;
      updateModeHint();
    }

    const container = document.getElementById('roundsContainer');
    const empty = document.getElementById('emptyState');
    if (empty) empty.remove();

    const roundNum = container.children.length + 1;
    const group = createRoundGroup(question, roundNum);
    container.appendChild(group);

    document.getElementById('question').value = '';
    setSendEnabled(false);
    setStatus('正在连接...', true);

    const endpoint = `/query/${currentMode}`;
    const startTime = Date.now();
    let actionStepCount = 0;

    try {
      const resp = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, max_steps: 10, session_id: sessionId }),
      });

      if (!resp.ok) {
        throw new Error(`HTTP ${resp.status}`);
      }

      const reader  = resp.body.getReader();
      const decoder = new TextDecoder();
      let   buffer  = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let data;
          try { data = JSON.parse(line.slice(6)); } catch { continue; }

          if (data.type === 'start') {
            setStatus(`思考中...`, true);
            group.style.display = 'block';

          } else if (data.type === 'action') {
            actionStepCount++;
            setStatus(`Step ${data.step}：正在调用 ${data.action}...`, true);
            const stepsInner = document.getElementById(`steps-${roundNum}`);
            const card = createStepCard(data);
            stepsInner.appendChild(card);
            card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

          } else if (data.type === 'final') {
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
            const stepsInner = document.getElementById(`steps-${roundNum}`);
            const card = createFinalCard(data, actionStepCount, elapsed);
            stepsInner.appendChild(card);
            card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            setStatus('完成', false);

          } else if (data.type === 'max_steps' || data.type === 'error') {
            const stepsInner = document.getElementById(`steps-${roundNum}`);
            const card = createErrorCard(data.answer || data.observation || data.message || '未知错误');
            stepsInner.appendChild(card);
            setStatus('', false);

          } else if (data.type === 'done') {
            setStatus('', false);
            if (data.session_id) {
              sessionId = data.session_id;
              document.getElementById('sessionIdChip').textContent = sessionId;
            }
          }
        }
      }
    } catch (err) {
      const stepsInner = document.getElementById(`steps-${roundNum}`);
      stepsInner.appendChild(createErrorCard(`请求失败: ${err.message}`));
      setStatus('', false);
    } finally {
      setSendEnabled(true);
    }
  }

  // 回车发送
  document.getElementById('question').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
  });

  // 启动
  initSession();
</script>
</body>
</html>
